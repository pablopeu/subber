name: release

# Builds Subber NATIVELY per platform and publishes a GitHub Release.
#
# pkg embeds V8 bytecode compiled by the host Node, which the target V8 rejects
# when you cross-compile (e.g. a node22-win binary built on Linux fails on
# Windows with "V8 rejected the bytecode cache"). So each package is built on
# its own OS, where pkg can run the target's node to compile matching bytecode.
#
#   - ubuntu-latest  → linux tar.gz
#   - windows-latest → windows zip + NSIS installer
#
# On a `v*` tag: a follow-up job aggregates both and creates the Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - run: npm install

      - name: Fetch Google Fonts
        run: npm run fonts

      - name: Build ${{ matrix.target }} package
        run: npm run package:${{ matrix.target }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: subber-${{ matrix.target }}
          path: |
            dist-win/Subber-win-x64.zip
            dist-win/Subber-Setup-x64.exe
            dist-linux/Subber-linux-x64.tar.gz
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/subber-win/Subber-win-x64.zip
            artifacts/subber-win/Subber-Setup-x64.exe
            artifacts/subber-linux/Subber-linux-x64.tar.gz
          generate_release_notes: true
