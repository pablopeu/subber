name: release

# Builds Subber NATIVELY per platform and publishes a GitHub Release.
#
# Two cross-platform gotchas drive this layout:
#   1. pkg embeds V8 bytecode compiled by the host Node — a node22-win binary
#      built on Linux fails on Windows ("V8 rejected the bytecode cache"). So
#      each package is built on its own OS.
#   2. Vite 8's rolldown ships a per-platform native binding whose optional dep
#      isn't reliably installed from a Linux-generated lockfile on Windows. The
#      client output is portable, so it's built once on Linux and shared.
#
#   web  (ubuntu)     → builds the client once → client/dist artifact
#   build (matrix)    → windows-lastes/win + ubuntu-latest/linux, pkg each
#   release           → on a `v*` tag, aggregates everything into a Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build -w client
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: client/dist
          if-no-files-found: error

  build:
    needs: web
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - run: npm install

      - name: Download pre-built client
        uses: actions/download-artifact@v4
        with:
          name: web
          path: client/dist

      - name: Fetch Google Fonts
        run: npm run fonts

      - name: Build ${{ matrix.target }} package
        env:
          SUBBER_WEB: client/dist
          # Chocolatey puts makensis here; also surfaced as a fallback in package.mjs.
          MAKENSIS: 'C:\Program Files (x86)\NSIS\makensis.exe'
        run: npm run package:${{ matrix.target }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: subber-${{ matrix.target }}
          path: |
            dist-win/Subber-win-x64.zip
            dist-win/Subber-Setup-x64.exe
            dist-linux/Subber-linux-x64.tar.gz
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'Subber-win-x64.zip' -o -name 'Subber-Setup-x64.exe' -o -name 'Subber-linux-x64.tar.gz' \) -print -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
